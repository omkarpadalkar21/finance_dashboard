spring:
  application:
    name: Finance_Dashboard
  datasource:
    url: jdbc:h2:mem:financedb
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
